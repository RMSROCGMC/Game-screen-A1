<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>歷史決戰：帝君對決大總統</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #2c3e50; font-family: sans-serif; color: white; -webkit-touch-callout: none; user-select: none; }
        
        /* 加載畫面 */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        #loading-bar-container { width: 60%; height: 20px; background: #333; border-radius: 10px; margin-top: 20px; overflow: hidden; border: 2px solid #fff; }
        #loading-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #e74c3c, #f1c40f); transition: width 0.1s; }
        
        /* 主選單畫面 */
        #menu-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; justify-content: flex-end; align-items: center; z-index: 9999; }
        #menu-bg { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('1778345687994.png'); /* 請確保 GitHub 檔名完全一致 */
            background-size: contain; background-repeat: no-repeat; background-position: center; z-index: -1; 
        }
        #btn-start { background-color: rgba(231, 76, 60, 0.9); color: white; border: 3px solid white; padding: 15px 50px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-bottom: 10%; transition: transform 0.2s; -webkit-tap-highlight-color: transparent; }
        #btn-start:active { transform: scale(0.95); }
        
        /* 遊戲畫布 */
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <p style="font-size: 24px; font-weight: bold;">資源加載中...</p>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <p><span id="percent">0%</span></p>
    </div>

    <div id="menu-screen">
        <div id="menu-bg"></div>
        <button id="btn-start">開始對決</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>

    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const loadingBar = document.getElementById('loading-bar');
        const percentText = document.getElementById('percent');
        const menuScreen = document.getElementById('menu-screen');
        const btnStart = document.getElementById('btn-start');
        
        // 模擬加載
        let progress = 0;
        const timer = setInterval(() => {
            progress += Math.random() * 10;
            if (progress >= 100) {
                progress = 100;
                clearInterval(timer);
                percentText.innerText = '完成！';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    menuScreen.style.display = 'flex';
                }, 500);
            }
            loadingBar.style.width = progress + '%';
            percentText.innerText = Math.floor(progress) + '%';
        }, 100);

        // 點擊開始
        btnStart.addEventListener('click', () => {
            // 請求全螢幕
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(e => console.log("全螢幕受阻"));
            }
            // 嘗試鎖定橫屏
            if (screen.orientation && screen.orientation.lock) {
                screen.orientation.lock('landscape').catch(e => console.log("鎖定橫屏受阻"));
            }

            menuScreen.style.display = 'none';
            
            // 執行 game.js 裡的啟動函數
            if (typeof startGame === "function") {
                startGame();
            } else {
                alert("錯誤：game.js 尚未讀取成功");
            }
        });

        // 註冊 SW
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
