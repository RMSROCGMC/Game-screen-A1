<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>逃離東水</title>
    <style>
        :root { --main-blue: #0033ad; --main-gold: #f1c40f; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Microsoft JhengHei', sans-serif; color: white; user-select: none; }
        
        /* UI 容器 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 100; background: rgba(0,0,0,0.85); }
        .box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; border: 2px solid var(--main-gold); text-align: center; width: 320px; backdrop-filter: blur(10px); }
        
        /* 選單樣式 */
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; }
        select { background: #fff; color: #333; }
        .btn-start { background: var(--main-gold); color: #000; font-size: 20px; }
        
        /* 遊戲中 UI */
        #game-ui { position: fixed; top: 10px; left: 10px; right: 10px; display: none; z-index: 50; pointer-events: none; }
        .stats { display: flex; justify-content: space-between; font-size: 18px; text-shadow: 2px 2px #000; }
        #progress-container { width: 100%; height: 10px; background: rgba(255,255,255,0.3); border-radius: 5px; margin-top: 5px; }
        #progress-bar { width: 0%; height: 100%; background: var(--main-gold); border-radius: 5px; }

        /* 問答視窗 */
        #quiz-overlay { display: none; z-index: 200; }
        .option-btn { background: #fff; color: #333; text-align: left; margin: 5px 0; font-size: 14px; }
        .option-btn:hover { background: #eee; }

        canvas { display: block; }
    </style>
</head>
<body>

    <div id="main-menu" class="overlay">
        <div class="box">
            <h1 style="color: var(--main-gold); margin: 0;">逃離東水</h1>
            <p id="best-record">最佳紀錄: 0m</p>
            <select id="select-dept">
                <option value="電子">電子科</option>
                <option value="輪機">輪機科</option>
                <option value="食品">食品科</option>
                <option value="養殖">養殖科</option>
                <option value="家政">家政科</option>
                <option value="航管">航管科</option>
            </select>
            <select id="select-grade">
                <option value="1">高一</option>
                <option value="2" disabled id="opt-g2">高二 (未解鎖)</option>
                <option value="3" disabled id="opt-g3">高三 (未解鎖)</option>
            </select>
            <select id="select-diff">
                <option value="easy">簡單模式 (3000m)</option>
                <option value="normal">普通模式 (4500m)</option>
                <option value="hard">困難模式 (5000m)</option>
                <option value="extreme">極限模式 (6000m)</option>
            </select>
            <button class="btn-start" onclick="initGame()">開始逃離</button>
        </div>
    </div>

    <div id="game-ui">
        <div class="stats">
            <div id="hp-display">❤️❤️❤️</div>
            <div id="dist-display">0m / 3000m</div>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="quiz-overlay" class="overlay">
        <div class="box">
            <h3 id="quiz-q">題目加載中...</h3>
            <div id="quiz-options"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="game.js"></script>
</body>
</html>
